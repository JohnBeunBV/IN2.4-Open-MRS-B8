services:
 
  # ═══════════════════════════════════════════════════════
  #  OPENMRS
  # ═══════════════════════════════════════════════════════
 
  gateway:
    image: openmrs/openmrs-reference-application-3-gateway:${TAG:-qa}
    platform: linux/amd64
    restart: "unless-stopped"
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "5005:5005"
    networks:
      - app-network
 
  frontend:
    image: openmrs/openmrs-reference-application-3-frontend:${TAG:-qa}
    platform: linux/amd64
    restart: "unless-stopped"
    environment:
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS: /openmrs/spa/config-core_demo.json
      SPA_DEFAULT_LOCALE:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      timeout: 5s
    depends_on:
      - backend
    networks:
      - app-network
 
  backend:
    image: openmrs/openmrs-reference-application-3-backend:${TAG:-qa}
    platform: linux/amd64
    restart: "unless-stopped"
    depends_on:
      - db
    environment:
      OMRS_DEV_DEBUG_PORT: "5005"
      OMRS_CONFIG_MODULE_WEB_ADMIN: "true"
      OMRS_CONFIG_AUTO_UPDATE_DATABASE: "true"
      OMRS_CONFIG_CREATE_TABLES: "true"
      OMRS_CONFIG_CONNECTION_SERVER: db
      OMRS_CONFIG_CONNECTION_DATABASE: openmrs
      OMRS_CONFIG_CONNECTION_USERNAME: ${OMRS_DB_USER:-openmrs}
      OMRS_CONFIG_CONNECTION_PASSWORD: ${OMRS_DB_PASSWORD:-openmrs}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openmrs"]
      timeout: 5s
    volumes:
      - openmrs-data:/openmrs/data
    networks:
      - app-network
 
  db:
    image: mariadb:10.11.7
    restart: "unless-stopped"
    command: "mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci"
    healthcheck:
      test: "mysql --user=${OMRS_DB_USER:-openmrs} --password=${OMRS_DB_PASSWORD:-openmrs} --execute \"SHOW DATABASES;\""
      interval: 3s
      timeout: 1s
      retries: 5
    environment:
      MYSQL_DATABASE: openmrs
      MYSQL_USER: ${OMRS_DB_USER:-openmrs}
      MYSQL_PASSWORD: ${OMRS_DB_PASSWORD:-openmrs}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-openmrs}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
 
  # ═══════════════════════════════════════════════════════
  #  COMMUNICATIEMODULE
  # ═══════════════════════════════════════════════════════
 
  communicatiemodule:
  
    build: ./communication-module
    container_name: communicatiemodule
    ports:
      - "8090:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://comm-postgres:5432/communicatiemodule
      SPRING_DATASOURCE_USERNAME: commuser
      SPRING_DATASOURCE_PASSWORD: commpass
      SPRING_RABBITMQ_HOST: comm-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_CLOUD_VAULT_HOST: comm-vault
      SPRING_CLOUD_VAULT_PORT: 8200
      SPRING_CLOUD_VAULT_TOKEN: root-token
      SPRING_CLOUD_VAULT_SCHEME: http
      APP_PROVIDERS_BASE_URL: http://comm-fakecomworld:8080
      APP_FHIR_CALLBACK_BASE_URL: http://communicatiemodule:8080
      SECUREPOST_USERNAME: securepost-client-id
      SECUREPOST_PASSWORD: securepost-secret-key
      ASYNCFLOW_API_KEY: asyncflow-api-key
      LEGACYLINK_USERNAME: legacylink-user
      LEGACYLINK_PASSWORD: legacylink-password
      SWIFTSEND_API_KEY: your-api-key-here
    depends_on:
      comm-postgres:
        condition: service_healthy
      comm-rabbitmq:
        condition: service_healthy
      comm-vault:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
 
  comm-postgres:
    image: postgres:16-alpine
    container_name: comm-postgres
    environment:
      POSTGRES_DB: communicatiemodule
      POSTGRES_USER: commuser
      POSTGRES_PASSWORD: commpass
    ports:
      - "5432:5432"
    volumes:
      - comm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commuser -d communicatiemodule"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
 
  comm-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: comm-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - comm-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - app-network
 
  comm-vault:
    image: hashicorp/vault:1.16
    container_name: comm-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: vault server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
 
  comm-vault-init:
    image: hashicorp/vault:1.16
    container_name: comm-vault-init
    depends_on:
      comm-vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://comm-vault:8200
      VAULT_TOKEN: root-token
    volumes:
      - ./communication-module/vault:/vault/scripts:ro
    command: sh /vault/scripts/vault-init.sh
    networks:
      - app-network
    restart: "no"
 
  comm-prometheus:
    image: prom/prometheus:v2.51.0
    container_name: comm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./communication-module/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - comm-prometheus-data:/prometheus
    networks:
      - app-network
 
  comm-grafana:
    image: grafana/grafana:10.4.0
    container_name: comm-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - comm-grafana-data:/var/lib/grafana
      - ./communication-module/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - comm-prometheus
    networks:
      - app-network
 
  comm-fakecomworld:
    image: ghcr.io/avansict/in2.4-fakecomworld:main
    container_name: comm-fakecomworld
    ports:
      - "1337:8080"
    networks:
      - app-network
 
networks:
  app-network:
    driver: bridge
 
volumes:
  openmrs-data:
  db-data:
  comm-postgres-data:
  comm-rabbitmq-data:
  comm-prometheus-data:
  comm-grafana-data:
  