version: "3.9"

services:
  # ─── Application ──────────────────────────────────────────────────────────
  communicatiemodule:
    build: .
    container_name: communicatiemodule
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/communicatiemodule
      SPRING_DATASOURCE_USERNAME: commuser
      SPRING_DATASOURCE_PASSWORD: commpass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_CLOUD_VAULT_HOST: vault
      SPRING_CLOUD_VAULT_PORT: 8200
      SPRING_CLOUD_VAULT_TOKEN: root-token
      SPRING_CLOUD_VAULT_SCHEME: http
      APP_PROVIDERS_BASE_URL: http://fakecomworld:8080
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - comm-network
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: comm-postgres
    environment:
      POSTGRES_DB: communicatiemodule
      POSTGRES_USER: commuser
      POSTGRES_PASSWORD: commpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commuser -d communicatiemodule"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comm-network

  # ─── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: comm-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - comm-network

  # ─── HashiCorp Vault ───────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: comm-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: vault server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comm-network

  # ─── Vault Init (seeds secrets) ────────────────────────────────────────────
  vault-init:
    image: hashicorp/vault:1.16
    container_name: comm-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root-token
    volumes:
      - ./vault:/vault/scripts:ro
    command: sh /vault/scripts/vault-init.sh
    networks:
      - comm-network
    restart: "no"

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: comm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - comm-network

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: comm-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DATASOURCE_URL: http://prometheus:9090
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - comm-network

  # ─── Fake Messaging Providers ──────────────────────────────────────────────
  fakecomworld:
    image: ghcr.io/avansict/in2.4-fakecomworld:main
    container_name: comm-fakecomworld
    ports:
      - "1337:8080"
    networks:
      - comm-network

networks:
  comm-network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
