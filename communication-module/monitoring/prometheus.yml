global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'communicatiemodule'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['communicatiemodule:8080']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['comm-rabbitmq:15692']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
