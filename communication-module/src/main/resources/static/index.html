<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CommunicatieModule — Beheer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --bg:        #080f1a;
    --surface:   #0d1829;
    --border:    #1a2d4a;
    --accent:    #00d4ff;
    --accent2:   #0066ff;
    --danger:    #ff3b5c;
    --success:   #00e5a0;
    --warn:      #ffb800;
    --text:      #e8f0fe;
    --muted:     #5a7a9a;
    --mono:      'DM Mono', monospace;
    --head:      'Syne', sans-serif;
    --body:      'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.6;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0,102,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,212,255,0.05) 0%, transparent 50%);
  }
  /* ── Layout ── */
  .shell { display: flex; height: 100vh; overflow: hidden; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 0;
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo h1 {
    font-family: var(--head);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -.3px;
    color: var(--accent);
    line-height: 1.2;
  }
  .sidebar-logo span {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .nav { flex: 1; padding: 12px 0; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    font-size: 13px; font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
    user-select: none;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,212,255,.06); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .main { flex: 1; overflow-y: auto; padding: 32px 36px; }
  /* ── Page header ── */
  .page-header { margin-bottom: 28px; }
  .page-header h2 { font-family: var(--head); font-size: 22px; font-weight: 700; }
  .page-header p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: var(--head); font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); margin-bottom: 18px;
  }
  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--muted); padding: 0 12px 10px;
    text-align: left; border-bottom: 1px solid var(--border);
  }
  td {
    padding: 13px 12px; font-size: 13px;
    border-bottom: 1px solid rgba(26,45,74,.6);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }
  /* ── Badges ── */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 4px;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: .5px;
  }
  .badge-active { background: rgba(0,229,160,.12); color: var(--success); border: 1px solid rgba(0,229,160,.25); }
  .badge-inactive { background: rgba(255,59,92,.1); color: var(--danger); border: 1px solid rgba(255,59,92,.2); }
  .badge-provider {
    background: rgba(0,102,255,.12); color: #6ba3ff;
    border: 1px solid rgba(0,102,255,.25);
  }
  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px; border-radius: 6px;
    font-family: var(--body); font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; transition: all .15s;
    text-decoration: none;
  }
  .btn-primary {
    background: var(--accent2); color: #fff;
    box-shadow: 0 0 20px rgba(0,102,255,.3);
  }
  .btn-primary:hover { background: #0055dd; box-shadow: 0 0 25px rgba(0,102,255,.45); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-danger { background: rgba(255,59,92,.15); color: var(--danger); border: 1px solid rgba(255,59,92,.3); }
  .btn-danger:hover { background: rgba(255,59,92,.25); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  /* ── Form ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  input, select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 12px;
    color: var(--text); font-family: var(--body); font-size: 13px;
    transition: border-color .15s;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(0,102,255,.15); }
  input::placeholder { color: var(--muted); }
  select option { background: var(--surface); }
  .form-hint { font-size: 11px; color: var(--muted); }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  /* ── Modal ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn .15s ease;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; width: 560px; max-width: 95vw;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
    animation: slideUp .2s ease;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-header h3 { font-family: var(--head); font-size: 18px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 4px; }
  .modal-close:hover { color: var(--text); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  /* ── Alert ── */
  .alert {
    padding: 12px 16px; border-radius: 6px; font-size: 13px;
    margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
  }
  .alert-error { background: rgba(255,59,92,.1); border: 1px solid rgba(255,59,92,.25); color: #ff7a90; }
  .alert-success { background: rgba(0,229,160,.1); border: 1px solid rgba(0,229,160,.25); color: var(--success); }
  /* ── Stats row ── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px;
  }
  .stat-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
  .stat-value { font-family: var(--head); font-size: 28px; font-weight: 700; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.success { color: var(--success); }
  .stat-value.warn { color: var(--warn); }
  .stat-value.danger { color: var(--danger); }
  /* ── Logs ── */
  .log-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(26,45,74,.4); font-size: 12px; }
  .log-row:last-child { border-bottom: none; }
  .log-time { font-family: var(--mono); color: var(--muted); white-space: nowrap; }
  .log-provider { font-family: var(--mono); }
  .log-status-ok { color: var(--success); }
  .log-status-fail { color: var(--danger); }
  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 13px; }
  /* ── Loading ── */
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-center { display: flex; justify-content: center; padding: 40px; }
  /* ── URL display ── */
  .url-chip {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    background: rgba(0,0,0,.3); padding: 2px 7px; border-radius: 4px;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: inline-block;
  }
  /* ── Action row ── */
  .action-row { display: flex; gap: 6px; }
  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = '/api/organisations';

const PROVIDERS = [
  { value: 'SWIFT_SEND',  label: 'SwiftSend' },
  { value: 'LEGACY_LINK', label: 'LegacyLink' },
  { value: 'ASYNC_FLOW',  label: 'AsyncFlow' },
  { value: 'SECURE_POST', label: 'SecurePost' },
];

const TIMEZONES = [
  'UTC','Europe/Amsterdam','Europe/London','America/New_York',
  'America/Chicago','America/Los_Angeles','Asia/Tokyo','Asia/Singapore',
  'Australia/Sydney','Africa/Johannesburg',
];

function providerLabel(v) {
  return PROVIDERS.find(p => p.value === v)?.label ?? v;
}

function timeAgo(iso) {
  if (!iso) return '—';
  const d = new Date(iso), now = new Date();
  const s = Math.floor((now - d) / 1000);
  if (s < 60) return `${s}s geleden`;
  if (s < 3600) return `${Math.floor(s/60)}m geleden`;
  if (s < 86400) return `${Math.floor(s/3600)}u geleden`;
  return d.toLocaleDateString('nl-NL');
}

// ── Form component ──────────────────────────────────────────────────────────
function OrgForm({ initial, onSave, onCancel, loading, error }) {
  const blank = {
    name: '', openmrsBaseUrl: 'http://gateway/openmrs',
    openmrsUsername: 'admin', openmrsPassword: 'Admin1234',
    providerType: 'SWIFT_SEND', callbackToken: '', timezone: 'Europe/Amsterdam', language: 'nl',
  };
  const [form, setForm] = useState(initial ?? blank);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const genToken = () => set('callbackToken',
    Array.from(crypto.getRandomValues(new Uint8Array(20)))
      .map(b => b.toString(16).padStart(2,'0')).join(''));

  return (
    <form onSubmit={e => { e.preventDefault(); onSave(form); }}>
      {error && <div className="alert alert-error">⚠ {error}</div>}
      <div className="form-grid">
        <div className="form-group full">
          <label>Naam organisatie</label>
          <input value={form.name} onChange={e => set('name', e.target.value)}
            placeholder="bijv. Polikliniek Steenbergen" required/>
        </div>
        <div className="form-group full">
          <label>OpenMRS URL</label>
          <input value={form.openmrsBaseUrl} onChange={e => set('openmrsBaseUrl', e.target.value)}
            placeholder="http://gateway/openmrs" required/>
          <span className="form-hint">Gebruik <code>http://gateway/openmrs</code> voor lokale Docker setup</span>
        </div>
        <div className="form-group">
          <label>OpenMRS gebruikersnaam</label>
          <input value={form.openmrsUsername} onChange={e => set('openmrsUsername', e.target.value)}
            placeholder="admin" required/>
        </div>
        <div className="form-group">
          <label>OpenMRS wachtwoord</label>
          <input type="password" value={form.openmrsPassword} onChange={e => set('openmrsPassword', e.target.value)}
            placeholder="Admin1234" required/>
        </div>
        <div className="form-group">
          <label>Messaging provider</label>
          <select value={form.providerType} onChange={e => set('providerType', e.target.value)}>
            {PROVIDERS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label>Tijdzone</label>
          <select value={form.timezone} onChange={e => set('timezone', e.target.value)}>
            {TIMEZONES.map(tz => <option key={tz} value={tz}>{tz}</option>)}
          </select>
        </div>
        <div className="form-group full">
          <label>Webhook token</label>
          <div style={{display:'flex', gap:8}}>
            <input value={form.callbackToken} onChange={e => set('callbackToken', e.target.value)}
              placeholder="Geheim token voor webhook authenticatie" required style={{flex:1}}/>
            <button type="button" className="btn btn-ghost btn-sm" onClick={genToken}>Genereer</button>
          </div>
          <span className="form-hint">Wordt gebruikt om inkomende FHIR webhook calls te authenticeren</span>
        </div>
      </div>
      <div className="form-actions" style={{marginTop:20}}>
        <button type="button" className="btn btn-ghost" onClick={onCancel}>Annuleren</button>
        <button type="submit" className="btn btn-primary" disabled={loading}>
          {loading ? <span className="spinner"/> : '💾'} Opslaan
        </button>
      </div>
    </form>
  );
}

// ── Organisations tab ───────────────────────────────────────────────────────
function OrgsTab() {
  const [orgs, setOrgs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [saving, setSaving] = useState(false);
  const [formError, setFormError] = useState('');
  const [toast, setToast] = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const r = await fetch(API);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      setOrgs(await r.json());
    } catch (e) {
      setToast('❌ Laden mislukt: ' + e.message);
    } finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(''), 3500);
    return () => clearTimeout(t);
  }, [toast]);

  const openCreate = () => { setEditing(null); setFormError(''); setShowModal(true); };
  const openEdit = org => { setEditing(org); setFormError(''); setShowModal(true); };

  const save = async (form) => {
    setSaving(true); setFormError('');
    try {
      const url = editing ? `${API}/${editing.id}` : API;
      const method = editing ? 'PUT' : 'POST';
      const r = await fetch(url, {
        method, headers: {'Content-Type':'application/json'},
        body: JSON.stringify(form),
      });
      if (!r.ok) {
        const txt = await r.text();
        throw new Error(txt || 'HTTP ' + r.status);
      }
      setShowModal(false);
      setToast(editing ? '✅ Organisatie bijgewerkt' : '✅ Organisatie aangemaakt');
      load();
    } catch (e) {
      setFormError(e.message);
    } finally { setSaving(false); }
  };

  const deactivate = async (id, name) => {
    if (!confirm(`Organisatie "${name}" deactiveren?`)) return;
    try {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      setToast('✅ Gedeactiveerd');
      load();
    } catch (e) {
      setToast('❌ ' + e.message);
    }
  };

  const active = orgs.filter(o => o.active);
  const inactive = orgs.filter(o => !o.active);

  return (
    <>
      {toast && (
        <div className={`alert ${toast.startsWith('❌') ? 'alert-error' : 'alert-success'}`}
          style={{position:'fixed', top:20, right:24, zIndex:200, minWidth:260, boxShadow:'0 8px 30px rgba(0,0,0,.4)'}}>
          {toast}
        </div>
      )}

      <div className="page-header">
        <h2>Organisaties</h2>
        <p>Beheer gekoppelde OpenMRS-instanties en hun messaging providers</p>
      </div>

      <div className="stats">
        <div className="stat">
          <div className="stat-label">Totaal</div>
          <div className="stat-value accent">{orgs.length}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Actief</div>
          <div className="stat-value success">{active.length}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Inactief</div>
          <div className="stat-value danger">{inactive.length}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Providers</div>
          <div className="stat-value" style={{fontSize:16, paddingTop:6}}>
            {[...new Set(orgs.map(o => providerLabel(o.providerType)))].join(', ') || '—'}
          </div>
        </div>
      </div>

      <div className="card">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18}}>
          <div className="card-title" style={{marginBottom:0}}>Geregistreerde organisaties</div>
          <button className="btn btn-primary btn-sm" onClick={openCreate}>＋ Nieuw</button>
        </div>

        {loading ? (
          <div className="loading-center"><div className="spinner"/></div>
        ) : orgs.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">🏥</div>
            <p>Nog geen organisaties geregistreerd.<br/>Klik op <strong>Nieuw</strong> om te beginnen.</p>
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Naam</th>
                  <th>OpenMRS URL</th>
                  <th>Provider</th>
                  <th>Tijdzone</th>
                  <th>Status</th>
                  <th>Aangemaakt</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {orgs.map(org => (
                  <tr key={org.id}>
                    <td><strong>{org.name}</strong></td>
                    <td><span className="url-chip" title={org.openmrsBaseUrl}>{org.openmrsBaseUrl}</span></td>
                    <td><span className="badge badge-provider">{providerLabel(org.providerType)}</span></td>
                    <td><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted)'}}>{org.timezone ?? 'UTC'}</span></td>
                    <td>
                      <span className={`badge ${org.active ? 'badge-active' : 'badge-inactive'}`}>
                        {org.active ? '● actief' : '○ inactief'}
                      </span>
                    </td>
                    <td style={{color:'var(--muted)',fontSize:12}}>{timeAgo(org.createdAt)}</td>
                    <td>
                      <div className="action-row">
                        <button className="btn btn-ghost btn-sm" onClick={() => openEdit(org)}>✏</button>
                        {org.active &&
                          <button className="btn btn-danger btn-sm" onClick={() => deactivate(org.id, org.name)}>✕</button>
                        }
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {showModal && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && setShowModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <h3>{editing ? 'Organisatie bewerken' : 'Nieuwe organisatie'}</h3>
              <button className="modal-close" onClick={() => setShowModal(false)}>×</button>
            </div>
            <OrgForm
              initial={editing}
              onSave={save}
              onCancel={() => setShowModal(false)}
              loading={saving}
              error={formError}
            />
          </div>
        </div>
      )}
    </>
  );
}

// ── Logs tab ────────────────────────────────────────────────────────────────
function LogsTab() {
  const [orgs, setOrgs] = useState([]);
  const [selected, setSelected] = useState('');
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    fetch(API).then(r => r.json()).then(data => {
      setOrgs(data.filter(o => o.active));
      if (data.length > 0) setSelected(data[0].id);
    }).catch(() => {});
  }, []);

  useEffect(() => {
    if (!selected) return;
    setLoading(true);
    fetch(`${API}/${selected}/logs`)
      .then(r => r.json())
      .then(setLogs)
      .catch(() => setLogs([]))
      .finally(() => setLoading(false));
  }, [selected]);

  return (
    <>
      <div className="page-header">
        <h2>Berichtenlogs</h2>
        <p>Overzicht van verstuurde notificaties per organisatie</p>
      </div>
      <div className="card">
        <div style={{display:'flex', gap:12, alignItems:'center', marginBottom:20}}>
          <label style={{whiteSpace:'nowrap'}}>Organisatie</label>
          <select value={selected} onChange={e => setSelected(e.target.value)} style={{maxWidth:280}}>
            {orgs.map(o => <option key={o.id} value={o.id}>{o.name}</option>)}
          </select>
        </div>
        {loading ? (
          <div className="loading-center"><div className="spinner"/></div>
        ) : logs.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📭</div>
            <p>Geen logs gevonden voor deze organisatie.</p>
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Tijdstip</th>
                  <th>Provider</th>
                  <th>Ontvanger</th>
                  <th>Status</th>
                  <th>Notitie</th>
                </tr>
              </thead>
              <tbody>
                {logs.map((log, i) => (
                  <tr key={log.id ?? i}>
                    <td className="log-time">{log.sentAt ? new Date(log.sentAt).toLocaleString('nl-NL') : '—'}</td>
                    <td><span className="badge badge-provider">{providerLabel(log.providerType)}</span></td>
                    <td style={{fontFamily:'var(--mono)',fontSize:12}}>{log.recipientPhone ?? '—'}</td>
                    <td>
                      <span className={log.success ? 'log-status-ok' : 'log-status-fail'}>
                        {log.success ? '✓ Verstuurd' : '✗ Mislukt'}
                      </span>
                    </td>
                    <td style={{color:'var(--muted)',fontSize:12}}>{log.note ?? ''}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </>
  );
}

// ── Status tab ──────────────────────────────────────────────────────────────
function StatusTab() {
  const links = [
    { label: 'Grafana Dashboard', url: 'http://localhost:3000', icon: '📊', desc: 'Metrics & monitoring' },
    { label: 'RabbitMQ Management', url: 'http://localhost:15672', icon: '🐇', desc: 'Message queue beheer' },
    { label: 'Prometheus', url: 'http://localhost:9090', icon: '🔥', desc: 'Metrics opslag' },
    { label: 'Vault UI', url: 'http://localhost:8200', icon: '🔐', desc: 'Secrets management' },
    { label: 'FakeComWorld', url: 'http://localhost:1337', icon: '📨', desc: 'Mock messaging providers' },
    { label: 'OpenMRS', url: 'http://localhost/openmrs/spa/home', icon: '🏥', desc: 'Patiëntensysteem' },
  ];
  return (
    <>
      <div className="page-header">
        <h2>Systeem status</h2>
        <p>Snelkoppelingen naar alle services in de Docker stack</p>
      </div>
      <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14}}>
        {links.map(l => (
          <a key={l.url} href={l.url} target="_blank" rel="noreferrer"
            style={{textDecoration:'none'}}
            className="card"
            onMouseEnter={e => e.currentTarget.style.borderColor='var(--accent2)'}
            onMouseLeave={e => e.currentTarget.style.borderColor='var(--border)'}
          >
            <div style={{fontSize:28, marginBottom:10}}>{l.icon}</div>
            <div style={{fontFamily:'var(--head)', fontWeight:700, fontSize:14, marginBottom:4}}>{l.label}</div>
            <div style={{color:'var(--muted)', fontSize:12}}>{l.desc}</div>
            <div style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--accent2)', marginTop:10}}>{l.url} →</div>
          </a>
        ))}
      </div>
      <div className="card" style={{marginTop:8}}>
        <div className="card-title">API endpoints communicatiemodule</div>
        {[
          ['GET',    '/api/organisations',       'Alle organisaties ophalen'],
          ['POST',   '/api/organisations',       'Nieuwe organisatie aanmaken'],
          ['PUT',    '/api/organisations/{id}',  'Organisatie bijwerken'],
          ['DELETE', '/api/organisations/{id}',  'Organisatie deactiveren'],
          ['GET',    '/api/organisations/{id}/logs', 'Berichtenlogs'],
          ['POST',   '/api/fhir/webhook',        'FHIR webhook ontvangen'],
        ].map(([m, path, desc]) => (
          <div key={path} style={{display:'flex', gap:14, padding:'8px 0', borderBottom:'1px solid rgba(26,45,74,.4)', alignItems:'center'}}>
            <span style={{
              fontFamily:'var(--mono)', fontSize:10, fontWeight:600,
              padding:'2px 7px', borderRadius:3,
              background: m==='GET'?'rgba(0,229,160,.12)':m==='POST'?'rgba(0,102,255,.12)':m==='PUT'?'rgba(255,184,0,.12)':'rgba(255,59,92,.12)',
              color: m==='GET'?'var(--success)':m==='POST'?'#6ba3ff':m==='PUT'?'var(--warn)':'var(--danger)',
              minWidth:48, textAlign:'center'
            }}>{m}</span>
            <span style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--text)', minWidth:260}}>{path}</span>
            <span style={{color:'var(--muted)', fontSize:12}}>{desc}</span>
          </div>
        ))}
      </div>
    </>
  );
}

// ── App shell ───────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('orgs');
  const tabs = [
    { id:'orgs',   label:'Organisaties', icon:'🏥' },
    { id:'logs',   label:'Logs',         icon:'📋' },
    { id:'status', label:'Status',       icon:'⚡' },
  ];
  return (
    <div className="shell">
      <nav className="sidebar">
        <div className="sidebar-logo">
          <h1>Communicatie<br/>Module</h1>
          <span>OpenMRS notificaties</span>
        </div>
        <div className="nav">
          {tabs.map(t => (
            <div key={t.id}
              className={`nav-item ${tab===t.id?'active':''}`}
              onClick={() => setTab(t.id)}
            >
              <span className="nav-icon">{t.icon}</span>
              {t.label}
            </div>
          ))}
        </div>
        <div style={{padding:'16px 20px', borderTop:'1px solid var(--border)'}}>
          <div style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--muted)', lineHeight:1.8}}>
            API: <span style={{color:'var(--accent)'}}>:8090</span><br/>
            OpenMRS: <span style={{color:'var(--accent)'}}>:80</span>
          </div>
        </div>
      </nav>
      <main className="main">
        {tab === 'orgs'   && <OrgsTab/>}
        {tab === 'logs'   && <LogsTab/>}
        {tab === 'status' && <StatusTab/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
