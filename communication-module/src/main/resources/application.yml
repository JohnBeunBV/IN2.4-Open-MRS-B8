server:
  port: 8080
  ssl:
    enabled: false # TLS handled by reverse proxy; enable here only if terminating SSL on app level

spring:
  application:
    name: communicatiemodule

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/communicatiemodule}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Explicit pool config (do not rely on Spring Boot defaults in production)
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: CommModulePool

  jpa:
    hibernate:
      ddl-auto: validate   # 'update' is unsafe in production; use Flyway/Liquibase migrations
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

  cloud:
    vault:
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      # Token must be supplied via VAULT_TOKEN env var; 'root-token' is not acceptable in production
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        default-context: communicatiemodule
      # fail-fast is set per-profile; see application-prod.yml for production override
      fail-fast: false

  config:
    import: "optional:vault://"

# ─── Application-specific settings ─────────────────────────────────────────
app:
  providers:
    base-url: ${PROVIDER_BASE_URL:http://localhost:1337}
    swiftsend:
      path: /swiftsend
      api-key: ${SWIFTSEND_API_KEY}
    securepost:
      path: /securepost
      username: ${SECUREPOST_USERNAME}
      password: ${SECUREPOST_PASSWORD}
    legacylink:
      path: /legacylink
      username: ${LEGACYLINK_USERNAME}
      password: ${LEGACYLINK_PASSWORD}
    asyncflow:
      path: /asyncflow
      api-key: ${ASYNCFLOW_API_KEY}
      poll-interval-ms: 3000
      max-poll-attempts: 10

  scheduling:
    poll-interval-ms: 30000
    timezone-default: UTC

  fhir:
    callback-base-url: ${FHIR_CALLBACK_BASE_URL}
    callback-path: /fhir/webhook

  security:
    webhook-token: ${WEBHOOK_TOKEN}
    admin-password: ${ADMIN_PASSWORD}
    max-webhook-body-bytes: ${MAX_WEBHOOK_BODY_BYTES:1048576}
    # 32-byte Base64-encoded AES key for PII field encryption; generate with:
    # openssl rand -base64 32
    db-encryption-key: ${DB_ENCRYPTION_KEY}

  data-retention:
    patient-data-days: 14
    message-log-days: 365

  startup-validation:
    skip: false   # Override to true ONLY in test profiles

# ─── RabbitMQ queues ─────────────────────────────────────────────────────────
rabbitmq:
  exchange: notification.exchange
  queue: notification.queue
  dead-letter-queue: notification.dlq
  routing-key: notification.send
  max-retries: 5

# ─── Actuator / Prometheus ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized   # hide details from unauthenticated callers
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    nl.avans.communicatiemodule: INFO   # DEBUG only in local/test profiles
    ca.uhn.fhir: WARN
    org.springframework.security: WARN
    com.zaxxer.hikari: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# ─── Local development profile ───────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: local
  datasource:
    username: commuser
    password: commpass
  rabbitmq:
    username: guest
    password: guest
  cloud:
    vault:
      token: root-token
      fail-fast: false
  config:
    import: "optional:vault://"

app:
  security:
    webhook-token: local-dev-only-webhook-secret
    admin-password: local-dev-only-admin
    db-encryption-key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=  # 32 zero-bytes, dev only
  fhir:
    callback-base-url: http://localhost:8080
  startup-validation:
    skip: true  # skip in local dev

logging:
  level:
    nl.avans.communicatiemodule: DEBUG

---
# ─── Docker profile ──────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/communicatiemodule
  rabbitmq:
    host: rabbitmq
  cloud:
    vault:
      host: vault
