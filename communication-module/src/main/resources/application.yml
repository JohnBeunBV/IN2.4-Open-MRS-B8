server:
  port: 8080
  ssl:
    enabled: false   # Enable in production with cert+key

spring:
  application:
    name: communicatiemodule

  datasource:
    url: jdbc:postgresql://localhost:5432/communicatiemodule
    username: commuser
    password: commpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cloud:
    vault:
      host: localhost
      port: 8200
      scheme: http
      token: root-token
      kv:
        enabled: true
        default-context: communicatiemodule
      fail-fast: false   # Don't crash if Vault is unavailable in dev

  # Disable Vault config import if running without Vault
  config:
    import: "optional:vault://"

# ─── Application-specific settings ─────────────────────────────────────────
app:
  providers:
    base-url: http://localhost:1337
    swiftsend:
      path: /swiftsend
      api-key: ${SWIFTSEND_API_KEY:dev-key-swiftsend}
    securepost:
      path: /securepost
      username: ${SECUREPOST_USERNAME:dev-user}
      password: ${SECUREPOST_PASSWORD:dev-pass}
    legacylink:
      path: /legacylink
      username: ${LEGACYLINK_USERNAME:dev-user}
      password: ${LEGACYLINK_PASSWORD:dev-pass}
    asyncflow:
      path: /asyncflow
      api-key: ${ASYNCFLOW_API_KEY:dev-key-asyncflow}
      poll-interval-ms: 3000
      max-poll-attempts: 10

  scheduling:
    poll-interval-ms: 30000   # Check for due notifications every 30s
    timezone-default: UTC

  fhir:
    callback-base-url: ${FHIR_CALLBACK_BASE_URL:http://localhost:8080}
    callback-path: /fhir/webhook

  security:
    webhook-token: ${WEBHOOK_TOKEN:dev-webhook-secret}

  data-retention:
    patient-data-days: 14
    message-log-days: 365

# ─── RabbitMQ queues ─────────────────────────────────────────────────────────
rabbitmq:
  exchange: notification.exchange
  queue: notification.queue
  dead-letter-queue: notification.dlq
  routing-key: notification.send
  max-retries: 5

# ─── Actuator / Prometheus ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    nl.avans.communicatiemodule: DEBUG
    ca.uhn.fhir: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# Docker profile overrides
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/communicatiemodule
  rabbitmq:
    host: rabbitmq
  cloud:
    vault:
      host: vault
