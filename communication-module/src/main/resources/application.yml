server:
  port: 8080
  ssl:
    enabled: false # Enable in production with cert+key

spring:
  application:
    name: communicatiemodule

  datasource:
    url: jdbc:postgresql://localhost:5432/communicatiemodule
    username: commuser
    password: commpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cloud:
    vault:
      host: localhost
      port: 8200
      scheme: http
      token: root-token
      kv:
        enabled: true
        default-context: communicatiemodule
      fail-fast: false # Don't crash if Vault is unavailable in dev

  # Disable Vault config import if running without Vault
  config:
    import: "optional:vault://"

# ─── Application-specific settings ─────────────────────────────────────────
app:
  providers:
    base-url: http://localhost:1337
    swiftsend:
      path: /swiftsend
      api-key: ${SWIFTSEND_API_KEY:your-api-key-here}
    securepost:
      path: /securepost
      username: ${SECUREPOST_USERNAME:securepost-client-id}
      password: ${SECUREPOST_PASSWORD:securepost-secret-key}
    legacylink:
      path: /legacylink
      username: ${LEGACYLINK_USERNAME:legacylink-user}
      password: ${LEGACYLINK_PASSWORD:legacylink-password}
    asyncflow:
      path: /asyncflow
      api-key: ${ASYNCFLOW_API_KEY:asyncflow-api-key}
      poll-interval-ms: 3000
      max-poll-attempts: 10

  scheduling:
    poll-interval-ms: 30000 # Check for due notifications every 30s
    timezone-default: UTC

  fhir:
    callback-base-url: ${FHIR_CALLBACK_BASE_URL:http://localhost:8080}
    callback-path: /fhir/webhook

  security:
    webhook-token: ${WEBHOOK_TOKEN:dev-webhook-secret}
    # Encryption settings
    encryption:
      algorithm: AES/GCM/NoPadding
      key-size: 256
      iv-length: 12
      tag-length: 128
      # Master key path in Vault (per organisation: {vault-credentials-path}/master-key)
      vault-key-path: "secret/communicatiemodule/keys/master-key"

  data-retention:
    patient-data-days: 14
    message-log-days: 365
    # Purge schedules (cron expressions)
    patient-data-purge-schedule: "0 2 * * *" # Daily at 2 AM
    message-log-purge-schedule: "0 3 * * *" # Daily at 3 AM

  # FHIR HL7 Compliance
  fhir-compliance:
    standard: "FHIR R4 (HL7)"
    message-processing:
      - "Receipt - Validate FHIR resources"
      - "Validation - Verify schema compliance"
      - "ACK - HTTP 200 for successful processing"
      - "Transformation - Convert to provider format"
      - "Queueing - RabbitMQ queue"
      - "Retry - Exponential backoff"
    supported-resources:
      - "Appointment"
      - "Patient"
      - "Location"

# ─── RabbitMQ queues ─────────────────────────────────────────────────────────
rabbitmq:
  exchange: notification.exchange
  queue: notification.queue
  dead-letter-queue: notification.dlq
  routing-key: notification.send
  max-retries: 5

# ─── Actuator / Prometheus ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    nl.avans.communicatiemodule: DEBUG
    ca.uhn.fhir: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# Docker profile overrides
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://comm-postgres:5432/communicatiemodule
  rabbitmq:
    host: comm-rabbitmq
  cloud:
    vault:
      host: comm-vault