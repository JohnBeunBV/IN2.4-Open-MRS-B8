server:
  port: 8080
  ssl:
    enabled: false

spring:
  application:
    name: communicatiemodule

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/communicatiemodule}
    username: ${DB_USERNAME:commuser}
    password: ${DB_PASSWORD:commpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: CommModulePool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  cloud:
    vault:
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      token: ${VAULT_TOKEN:root-token}
      kv:
        enabled: true
        default-context: communicatiemodule

# ─── Application-specific settings ─────────────────────────────────────────
      fail-fast: false # Don't crash if Vault is unavailable in dev
  config:
    import: "optional:vault://"

app:
  providers:
    base-url: ${APP_PROVIDERS_BASE_URL:http://localhost:1337}
    swiftsend:
      path: /swiftsend
      api-key: ${SWIFTSEND_API_KEY:your-api-key-here}
    securepost:
      path: /securepost
      username: ${SECUREPOST_USERNAME:securepost-client-id}
      password: ${SECUREPOST_PASSWORD:securepost-secret-key}
    legacylink:
      path: /legacylink
      username: ${LEGACYLINK_USERNAME:legacylink-user}
      password: ${LEGACYLINK_PASSWORD:legacylink-password}
    asyncflow:
      path: /asyncflow
      api-key: ${ASYNCFLOW_API_KEY:asyncflow-api-key}
      poll-interval-ms: 3000
      max-poll-attempts: 10

  scheduling:
    poll-interval-ms: 30000
    timezone-default: UTC

  # ── OpenMRS REST v1 Poller ─────────────────────────────────────────────────
  # Schakel in als FHIR Subscriptions niet beschikbaar zijn in jouw OpenMRS versie.
  # De poller haalt afspraken op via POST /ws/rest/v1/appointment/search
  poller:
    enabled: true                  # false = alleen FHIR webhooks gebruiken
    interval-ms: 120000            # polling interval (2 minuten)
    initial-delay-ms: 30000        # wacht 30s na opstarten
    connect-timeout-seconds: 5
    read-timeout-seconds: 10

  fhir:
    callback-base-url: ${FHIR_CALLBACK_BASE_URL:http://localhost:8080}
    callback-path: /fhir/webhook

  security:
    # No fallback defaults — must be set via environment variables
    webhook-token: ${WEBHOOK_TOKEN}
    admin-password: ${ADMIN_PASSWORD}

  data-retention:
    patient-data-days: 14
    message-log-days: 365

  startup-validation:
    skip: false

rabbitmq:
  exchange: notification.exchange
  queue: notification.queue
  dead-letter-queue: notification.dlq
  routing-key: notification.send
  max-retries: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: communicatiemodule

logging:
  level:
    nl.avans.communicatiemodule: DEBUG
    ca.uhn.fhir: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker
    import: "optional:vault://"
  datasource:
    url: jdbc:postgresql://comm-postgres:5432/communicatiemodule
  rabbitmq:
    host: comm-rabbitmq
  cloud:
    vault:
      host: comm-vault
