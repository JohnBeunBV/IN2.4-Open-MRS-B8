spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cloud:
    vault:
      enabled: false
      fail-fast: false
      token: test-token
  config:
    import: ""

app:
  security:
    webhook-token: test-webhook-token
    admin-password: test-admin-password
    db-encryption-key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  fhir:
    callback-base-url: http://localhost:8080
    callback-path: /fhir/webhook
  startup-validation:
    skip: true

rabbitmq:
  exchange: notification.exchange
  queue: notification.queue
  dead-letter-queue: notification.dlq
  routing-key: notification.send
  max-retries: 5

logging:
  level:
    nl.avans.communicatiemodule: DEBUG
